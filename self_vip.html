<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Glass Buttons</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 24px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .balance-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .balance-title {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .balance-amount {
            color: white;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Glass Button Base Style */
        .glass-btn {
            position: relative;
            padding: 20px 10px;
            border: none;
            border-radius: 20px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Glass Effect */
        .glass-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .glass-btn:hover::before {
            left: 100%;
        }

        .glass-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3);
        }

        .glass-btn:active {
            transform: translateY(2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* Gradient Backgrounds with Glass Effect */
        .btn-purple {
            background: linear-gradient(135deg, rgba(147, 112, 219, 0.8), rgba(123, 44, 191, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-pink {
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.8), rgba(219, 50, 150, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-blue {
            background: linear-gradient(135deg, rgba(64, 156, 255, 0.8), rgba(0, 102, 255, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-green {
            background: linear-gradient(135deg, rgba(46, 213, 115, 0.8), rgba(0, 184, 70, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-orange {
            background: linear-gradient(135deg, rgba(255, 159, 67, 0.8), rgba(255, 113, 26, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-red {
            background: linear-gradient(135deg, rgba(255, 99, 132, 0.8), rgba(255, 51, 102, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-teal {
            background: linear-gradient(135deg, rgba(72, 219, 251, 0.8), rgba(0, 180, 216, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-gold {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.8), rgba(218, 165, 32, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-cyan {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.8), rgba(0, 206, 209, 0.9));
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Special Buttons Row */
        .special-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .special-btn {
            padding: 15px 10px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .action-btn {
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .confirm-btn {
            grid-column: span 2;
            background: linear-gradient(135deg, rgba(50, 200, 100, 0.8), rgba(0, 150, 50, 0.9));
            font-size: 20px;
            padding: 20px;
        }

        /* Result Display */
        .result-display {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }

        .selected-number {
            color: white;
            font-size: 36px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .price-info {
            color: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            margin-top: 5px;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💎 خرید الماس VIP</h1>
        </div>

        <div class="balance-box">
            <div class="balance-title">موجودی شما</div>
            <div class="balance-amount" id="balance">نامحدود</div>
        </div>

        <div class="result-display">
            <div class="selected-number" id="selectedNumber">۰</div>
            <div class="price-info" id="priceInfo">مبلغ: ۰ تومان</div>
        </div>

        <!-- Number Buttons Grid -->
        <div class="buttons-grid">
            <button class="glass-btn btn-purple" onclick="addNumber(1)">۱</button>
            <button class="glass-btn btn-pink" onclick="addNumber(2)">۲</button>
            <button class="glass-btn btn-blue" onclick="addNumber(3)">۳</button>
            <button class="glass-btn btn-green" onclick="addNumber(4)">۴</button>
            <button class="glass-btn btn-orange" onclick="addNumber(5)">۵</button>
            <button class="glass-btn btn-red" onclick="addNumber(6)">۶</button>
            <button class="glass-btn btn-teal" onclick="addNumber(7)">۷</button>
            <button class="glass-btn btn-gold" onclick="addNumber(8)">۸</button>
            <button class="glass-btn btn-cyan" onclick="addNumber(9)">۹</button>
        </div>

        <!-- Special Buttons -->
        <div class="special-buttons">
            <button class="glass-btn special-btn" style="background: rgba(255, 99, 132, 0.3);" onclick="deleteOne()">⌫ حذف</button>
            <button class="glass-btn special-btn" style="background: rgba(54, 162, 235, 0.3);" onclick="addNumber(0)">۰</button>
            <button class="glass-btn special-btn" style="background: rgba(255, 206, 86, 0.3);" onclick="clearAll()">⟲ صفر</button>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="glass-btn action-btn" style="background: rgba(153, 102, 255, 0.4);" onclick="confirmPayment()">✅ تایید</button>
            <button class="glass-btn action-btn" style="background: rgba(255, 159, 64, 0.4);" onclick="backToMain()">🔙 بازگشت</button>
            <button class="glass-btn confirm-btn" onclick="confirmPayment()">💳 دریافت شماره کارت</button>
        </div>

        <a href="#" class="back-btn" onclick="backToMain()">بازگشت به پنل اصلی</a>

        <div class="footer">
            <p>پرداخت امن • پشتیبانی ۲۴ ساعته</p>
        </div>
    </div>

    <script>
        let currentNumber = 0;
        const PRICE_PER_1000 = 40000; // 40,000 تومان به ازای 1000 الماس

        function updateDisplay() {
            document.getElementById('selectedNumber').innerText = currentNumber.toLocaleString('fa-IR');
            const amount = Math.ceil(currentNumber / 1000) * PRICE_PER_1000;
            document.getElementById('priceInfo').innerText = `مبلغ: ${amount.toLocaleString('fa-IR')} تومان`;
        }

        function addNumber(num) {
            currentNumber = currentNumber * 10 + num;
            updateDisplay();
        }

        function deleteOne() {
            currentNumber = Math.floor(currentNumber / 10);
            updateDisplay();
        }

        function clearAll() {
            currentNumber = 0;
            updateDisplay();
        }

        function confirmPayment() {
            if (currentNumber === 0) {
                alert('❌ لطفاً تعداد الماس را وارد کنید');
                return;
            }
            
            // ارسال داده به تلگرام
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.sendData(JSON.stringify({
                    action: 'confirm_payment',
                    diamonds: currentNumber
                }));
                Telegram.WebApp.close();
            } else {
                alert(`✅ پرداخت برای ${currentNumber.toLocaleString('fa-IR')} الماس`);
            }
        }

        function backToMain() {
            if (window.Telegram && Telegram.WebApp) {
                Telegram.WebApp.sendData(JSON.stringify({
                    action: 'back_to_main'
                }));
                Telegram.WebApp.close();
            }
        }

        // دریافت موجودی از ربات
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            
            // دریافت داده از ربات
            window.Telegram.WebApp.onEvent('themeChanged', function() {
                console.log('Theme changed');
            });
        }

        // تنظیم موجودی (از طریق ربات قابل تغییر)
        function setBalance(balance) {
            document.getElementById('balance').innerText = balance;
        }

        updateDisplay();
    </script>
</body>
</html>
